name: CI

on: [push]

jobs:
  standalone-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Official standalone support matrix. Keep synchronized with:
      # - the maintainer comment block at the top of ./galitime
      # - the standalone support section in README.md
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.8"
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.14"
          - os: macos-15-intel
            python-version: "3.8"
          - os: macos-15-intel
            python-version: "3.9"

    steps:
    - uses: actions/checkout@v4
    - name: Install brew on osx
      if:   contains(matrix.os, 'macos')
      uses: Homebrew/actions/setup-homebrew@master
    - name: Install gtime on osx
      if:   contains(matrix.os, 'macos')
      run:  brew install gnu-time
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Run standalone smoke test
      run: |
        make -C tests/01_cli_version_smoke

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest]
        python-version: [ 3.9, "3.10", 3.11, 3.12 ]
        exclude:
          - python-version: "3.8"
            os: "macos-latest"
          - python-version: "3.9"
            os: "macos-latest"
        include:
          - python-version: "3.8"
            os: "macos-15-intel"
          - python-version: "3.9"
            os: "macos-15-intel"

    steps:
    - uses: actions/checkout@v4
    - name: Install brew on osx
      if:   contains(matrix.os, 'macos')
      uses: Homebrew/actions/setup-homebrew@master
    - name: Install gtime on osx
      if:   contains(matrix.os, 'macos')
      run:  brew install gnu-time
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    #- name: Add conda to system path
    #  run: |
    #    # $CONDA is an environment variable pointing to the root of the miniconda directory
    #    echo $CONDA/bin >> $GITHUB_PATH
    #- name: Install dependencies
    #  run: |
    #    conda env update --file environment.yml --name base
    - name: Run all tests
      run: |
        make test
